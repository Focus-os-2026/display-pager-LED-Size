<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAGER WALL — LED Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Anuphan:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --lcd-bg:#1f3a1a; --lcd-on:#9dff5e; --lcd-dim:#3f6b2e; --amber:#ffb44d; --target-w:1024px; --target-h:359px; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden;cursor:none}
  body{display:grid;place-items:center}

  .frame{position:relative;width:min(var(--target-w),100vw);height:min(var(--target-h),100vh);background:#000;display:grid;place-items:center}

  .pager{
    position:relative;width:100%;height:100%;aspect-ratio:auto;
    transform:translate(var(--ox,0px),var(--oy,0px));
    background:linear-gradient(180deg,#1d2418,#11150f);
    border-radius:2vw;padding:1.6vw;border:0.15vw solid #283021;
    box-shadow:0 2vw 6vw rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05);
  }
  .screen{
    position:relative;overflow:hidden;border-radius:1vw;height:100%;
    background:
      repeating-linear-gradient(0deg,rgba(0,0,0,.22) 0 2px,transparent 2px 4px),
      radial-gradient(120% 180% at 50% 0%,#2a4a22 0%,var(--lcd-bg) 70%);
    border:0.2vw solid #0c1408;
    box-shadow:inset 0 0 6vw rgba(0,0,0,.6),inset 0 0 1.5vw rgba(157,255,94,.15);
  }
  .screen::after{
    content:"";position:absolute;left:0;right:0;height:6%;pointer-events:none;
    background:linear-gradient(180deg,transparent,rgba(157,255,94,.07),transparent);
    animation:sweep 5s linear infinite;
  }
  @keyframes sweep{0%{top:-6%}100%{top:106%}}

  /* กล่องข้อความนิ่ง — จัดกลางจอ ตัดหลายบรรทัด ปรับขนาดอักษรอัตโนมัติ */
  .msgbox{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:1.2vh;
    padding:3% 4%;text-align:center;will-change:transform,opacity;
  }
  .msgbox .from{
    font-family:'Share Tech Mono',monospace;font-size:2.2vw;color:var(--lcd-dim);
    text-shadow:0 0 .6vw rgba(63,107,46,.6);letter-spacing:.1vw;flex:0 0 auto;
  }
  .msgbox .body{
    font-family:'Anuphan',sans-serif;font-weight:700;color:var(--lcd-on);
    line-height:1.18;width:94%;max-width:94%;
    white-space:normal;overflow-wrap:anywhere;word-break:break-word;
    text-shadow:0 0 1vw rgba(157,255,94,.55),0 0 2.5vw rgba(157,255,94,.25);
  }

  .idle{position:absolute;inset:0;display:grid;place-items:center;text-align:center;
    font-family:'Anuphan';font-weight:600;font-size:6vw;color:var(--lcd-dim);
    text-shadow:0 0 1vw rgba(63,107,46,.5);animation:blink 1.5s step-end infinite}
  @keyframes blink{50%{opacity:.35}}

  .calib{position:fixed;inset:0;pointer-events:none;display:none;z-index:50}
  .calib.on{display:block}
  .calib .cross{position:absolute;inset:0;
    background:
      linear-gradient(90deg,transparent 49.9%,rgba(255,0,0,.4) 50%,transparent 50.1%),
      linear-gradient(0deg,transparent 49.9%,rgba(255,0,0,.4) 50%,transparent 50.1%)}
  .calib .ring{position:absolute;border:2px dashed rgba(255,180,77,.8);border-radius:2vw;
    width:var(--pw,88vw);aspect-ratio:2.5/1;left:50%;top:50%;
    transform:translate(calc(-50% + var(--ox,0px)),calc(-50% + var(--oy,0px)))}
  .calib .hud{position:absolute;top:16px;left:16px;font-family:'Share Tech Mono';
    font-size:14px;color:#fff;background:rgba(0,0,0,.8);padding:12px 16px;border-radius:8px;
    line-height:1.7;pointer-events:auto}
  .calib .hud b{color:var(--amber)}
  .calib .hud kbd{background:#333;padding:1px 6px;border-radius:3px;border:1px solid #555}

  .conn{position:fixed;bottom:12px;right:14px;font-family:'Share Tech Mono';
    font-size:11px;color:#2a3a22;z-index:40}
  .conn.bad{color:#a33}
</style>
</head>
<body>
  <div class="frame">
    <div class="pager" id="pager">
      <div class="screen" id="screen">
        <div class="idle">● ● ●  WAITING FOR MESSAGE  ● ● ●</div>
      </div>
    </div>
  </div>

  <div class="calib" id="calib">
    <div class="cross"></div><div class="ring"></div>
    <div class="hud">
      <b>CALIBRATION MODE</b> &nbsp;(กด <kbd>C</kbd> เพื่อปิด)<br>
      <kbd>←</kbd><kbd>→</kbd> กว้าง &nbsp; <kbd>↑</kbd><kbd>↓</kbd> เลื่อนแนวตั้ง<br>
      <kbd>Shift</kbd>+<kbd>←→</kbd> เลื่อนแนวนอน<br>
      <kbd>F</kbd> = fullscreen &nbsp; <kbd>R</kbd> = รีเซ็ต<br>
      <span id="calibVals"></span>
    </div>
  </div>

  <div class="conn" id="conn">● connecting…</div>

<script>
(function(){
  "use strict";
  const screen = document.getElementById('screen');
  const conn   = document.getElementById('conn');
  const calib  = document.getElementById('calib');
  const calibVals = document.getElementById('calibVals');

  let queue = [];
  let jumpIds = [];
  let holdMs = 7000;
  const SLIDE_IN = 600, SLIDE_OUT = 500;
  let activeIndex = -1;
  let running = false;

  let actx;
  function pagerAlert(){
    try{
      actx = actx || new (window.AudioContext||window.webkitAudioContext)();
      [[880,0],[1320,.11]].forEach(([f,d])=>{
        const o=actx.createOscillator(),g=actx.createGain();
        o.type='square';o.frequency.value=f;o.connect(g);g.connect(actx.destination);
        const t=actx.currentTime+d;
        g.gain.setValueAtTime(.0001,t);
        g.gain.exponentialRampToValueAtTime(.1,t+.01);
        g.gain.exponentialRampToValueAtTime(.0001,t+.09);
        o.start(t);o.stop(t+.1);
      });
    }catch(e){}
  }
  function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  function showIdle(){
    activeIndex=-1;
    screen.innerHTML='<div class="idle">● ● ●  WAITING FOR MESSAGE  ● ● ●</div>';
  }

  // ปรับขนาดตัวอักษรให้ "ใหญ่ที่สุดเท่าที่ยังพอดีจอ" โดยตัดหลายบรรทัดได้
  // เริ่มจากตัวใหญ่มากแล้วค่อยลด จนกล่องข้อความสูงไม่เกินพื้นที่ + กว้างไม่เกินจอ
  function fitText(box){
    const body = box.querySelector('.body');
    const availH = screen.clientHeight * 0.86;   // เผื่อบรรทัด FROM ด้านบน
    const availW = screen.clientWidth  * 0.94;
    let size = Math.min(screen.clientHeight * 0.55, 360); // เพดานตัวใหญ่สุด
    body.style.fontSize = size + 'px';
    let guard = 0;
    while((body.scrollHeight > availH || body.scrollWidth > availW) && size > 14 && guard < 400){
      size -= 3; body.style.fontSize = size + 'px'; guard++;
    }
  }

  function showMessage(m){
    pagerAlert();
    screen.innerHTML =
      '<div class="msgbox" id="msgbox">'+
        '<div class="from">FROM: '+esc(m.who)+'</div>'+
        '<div class="body">'+esc(m.text)+'</div>'+
      '</div>';
    const box = document.getElementById('msgbox');
    fitText(box);
    running = true;
    box.animate(
      [{transform:'translateX(115%)',opacity:0},{transform:'translateX(0)',opacity:1}],
      {duration:SLIDE_IN,easing:'cubic-bezier(.18,.9,.25,1)',fill:'forwards'}
    );
    setTimeout(()=>{
      if(!document.getElementById('msgbox')) { running=false; loop(); return; }
      box.animate(
        [{transform:'translateX(0)',opacity:1},{transform:'translateX(-115%)',opacity:0}],
        {duration:SLIDE_OUT,easing:'cubic-bezier(.6,0,.8,.2)',fill:'forwards'}
      );
      setTimeout(()=>{ running=false; loop(); }, SLIDE_OUT);
    }, SLIDE_IN + holdMs);
  }

  function pickNext(){
    while(jumpIds.length){
      const id = jumpIds.shift();
      const i = queue.findIndex(x=>x.id===id);
      if(i!==-1){ activeIndex=i; return queue[i]; }
    }
    if(queue.length===0) return null;
    activeIndex=(activeIndex+1)%queue.length;
    return queue[activeIndex];
  }

  function loop(){
    if(running) return;
    const next = pickNext();
    if(!next){ showIdle(); return; }
    showMessage(next);
  }

  function connect(){
    const cloudHost = 'pager-wall-717366653528.asia-southeast1.run.app';
    const host = location.host === cloudHost ? location.host : cloudHost;
    const proto = host === cloudHost ? 'wss' : location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(proto+'://'+host+'/ws/display');
    ws.onopen = ()=>{ conn.textContent='● live'; conn.classList.remove('bad'); };
    ws.onclose= ()=>{ conn.textContent='● reconnecting…'; conn.classList.add('bad'); setTimeout(connect,1500); };
    ws.onmessage = (e)=>{
      const d = JSON.parse(e.data);
      if(d.type==='queue'){
        const prevId = queue[activeIndex] ? queue[activeIndex].id : null;
        queue = d.items||[];
        if(d.holdMs) holdMs = d.holdMs;
        if(prevId!==null){ activeIndex = queue.findIndex(x=>x.id===prevId); }
        if(!running) loop();
      } else if(d.type==='new'){
        if(d.holdMs) holdMs = d.holdMs;
        if(d.item && d.item.id!=null) jumpIds.push(d.item.id);
        if(!running) loop();
      } else if(d.type==='settings'){
        if(d.holdMs) holdMs = d.holdMs;
      }
    };
  }
  connect();

  let pw=88, ox=0, oy=0;
  function applyCalib(){
    document.documentElement.style.setProperty('--pw', pw+'vw');
    document.documentElement.style.setProperty('--ox', ox+'px');
    document.documentElement.style.setProperty('--oy', oy+'px');
    calibVals.textContent = `width:${pw}vw  x:${ox}  y:${oy}`;
  }
  applyCalib();
  document.addEventListener('keydown',(e)=>{
    const k=e.key.toLowerCase();
    if(k==='c'){ calib.classList.toggle('on'); }
    else if(k==='f'){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    else if(k==='r'){ pw=88;ox=0;oy=0;applyCalib(); }
    else if(calib.classList.contains('on')){
      if(e.key==='ArrowLeft'){ e.shiftKey?ox-=10:pw-=1; }
      else if(e.key==='ArrowRight'){ e.shiftKey?ox+=10:pw+=1; }
      else if(e.key==='ArrowUp'){ oy-=10; }
      else if(e.key==='ArrowDown'){ oy+=10; }
      pw=Math.max(20,Math.min(100,pw)); applyCalib();
    }
  });
})();
</script>
</body>
</html>
